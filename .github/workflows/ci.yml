name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest --cov-report=xml
      - name: Studio federation manifest drift
        run: python tools/emit_studio_manifest.py --check
      - name: Upload coverage to Codecov
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.6"
      - run: ruff check director_class_ai/ tests/ benchmarks/ tools/
      - run: ruff format --check director_class_ai/ tests/ benchmarks/ tools/
      - run: python tools/check_docstrings.py
      - run: python tools/check_test_quality.py
      - run: python tools/check_test_boundary_evidence.py
      - run: python tools/check_godfiles.py
      - run: python tools/check_documentation_surface.py
      - run: python tools/check_claim_boundaries.py

  types:
    name: Types (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install "mypy>=1.11"
      - run: mypy --strict director_class_ai/

  detectors-contract:
    name: Director-AI Detector Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev,detectors]"
      - run: python -m pytest tests/test_director_ai_contract.py -q --no-cov

  rust-parity:
    name: Rust Build & Differential Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: rustup show
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[dev]" "maturin>=1.8,<2"
      - run: .venv/bin/python -m maturin develop
      - run: .venv/bin/python -m pytest tests/test_rust_differential.py -q --no-cov
      - run: .venv/bin/python -m pytest --cov-report=xml

  spdx:
    name: SPDX header guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python tools/check_spdx.py

  sast:
    name: SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install "bandit>=1.7" semgrep
      - run: bandit -r director_class_ai/ -ll
      - run: semgrep scan --config p/python --config p/security-audit --error director_class_ai/

  fuzz:
    name: Fuzz (Hypothesis)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Run property-based invariants
        run: pytest tests/test_properties.py -v --hypothesis-seed=0 --cov-fail-under=0
        env:
          HYPOTHESIS_MAX_EXAMPLES: "500"

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install package + SBOM tooling
        run: |
          python -m pip install --no-deps -e .
          python -m pip install --require-hashes -r requirements/ci-sbom.txt
      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --of json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom.json

  package:
    name: Build & Wheel Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: cargo fetch --locked
      - run: python -m build --sdist --wheel --outdir dist
      # install the built wheel in a clean venv and import it — proves the
      # package is shippable, not just that the source tree imports
      - run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import director_class_ai as d; assert d.__version__ == '0.1.0', d.__version__; print('wheel import OK', d.__version__)"
